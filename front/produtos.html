<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Materialize -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <title>Cadastro de Produtos</title>

  <style>
    body { font-family: sans-serif; }

    #modalPesquisa {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
    }

    .modal-content {
      background: #fff;
      margin: 5% auto;
      padding: 20px;
      width: 90%;
      max-width: 800px;
      border-radius: 5px;
    }

    .btn-fechar {
      float: right;
      cursor: pointer;
      color: red;
      font-weight: bold;
    }

    .btn-acao {
      margin-right: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="container grey lighten-5" style="margin-top: 40px;">

  <div class="card">
    <div class="card-content">

      <h4 class="center-align green-text">Cadastro de Produtos</h4>

      <div class="center-align" style="margin-bottom: 20px;">
        <button class="btn" onclick="abrirModal()">
          Pesquisar Produtos
          <i class="material-icons left">search</i>
        </button>

        <button class="btn" onclick="limparFormulario()">
          Novo Produto
          <i class="material-icons left">add</i>
        </button>
      </div>

      <form id="formProduto">

        <input type="hidden" id="id">

        <div class="row">
          <div class="input-field col s6">
            <input id="nome" type="text" required>
            <label class="active">Nome</label>
          </div>

          <div class="input-field col s6">
            <input id="categoria" type="text" required>
            <label class="active">Categoria</label>
          </div>
        </div>

        <div class="row">
          <div class="input-field col s6">
            <input id="preco" type="number" required>
            <label class="active">Preço</label>
          </div>

          <div class="input-field col s6">
            <input id="estoque" type="number" required>
            <label class="active">Estoque</label>
          </div>
        </div>

        <div class="row">
          <div class="input-field col s12">
            <textarea id="descricao" class="materialize-textarea"></textarea>
            <label class="active">Descrição</label>
          </div>
        </div>

        <div class="center-align">
          <button class="btn" type="submit">Salvar</button>
        </div>
        <br>
        <div class="center-align">
            <a href="index.html" class="btn">Voltar</a>
          </div>


      </form>

    </div>
  </div>

</div>

<!-- MODAL -->
<div id="modalPesquisa">
  <div class="modal-content">
    <span class="btn-fechar" onclick="fecharModal()">X Fechar</span>

    <h5>Produtos Cadastrados</h5>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Nome</th>
          <th>Preço</th>
          <th>Ações</th>
        </tr>
      </thead>

      <tbody id="tabelaProdutos"></tbody>
    </table>

  </div>
</div>

<script>
const API = "http://localhost:3000";

const form = document.getElementById("formProduto");
const modal = document.getElementById("modalPesquisa");
const tabela = document.getElementById("tabelaProdutos");

// SUBMIT (CREATE / UPDATE)
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const produto = pegarDados();

  const metodo = produto.id ? "PUT" : "POST";
  const url = produto.id ? API + "/atualizar_produtos" : API + "/inserir_produtos";

  await fetch(url, {
    method: metodo,
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(produto)
  });

  alert("Salvo com sucesso!");
  limparFormulario();
});

// LISTAR
async function carregarProdutos() {
  const res = await fetch(API + "/produtos");
  const data = await res.json();

  tabela.innerHTML = "";

  data.resposta.forEach(p => {
    tabela.innerHTML += `
      <tr>
        <td>${p.id}</td>
        <td>${p.nome}</td>
        <td>${p.preco}</td>
        <td>
          <button class="btn-acao" onclick='editar(${JSON.stringify(p)})'>Editar</button>
          <button class="btn-acao" onclick='deletar(${p.id})'>Excluir</button>
        </td>
      </tr>
    `;
  });
}

// EDITAR
function editar(p) {
  document.getElementById("id").value = p.id;
  document.getElementById("nome").value = p.nome;
  document.getElementById("descricao").value = p.descricao;
  document.getElementById("preco").value = p.preco;
  document.getElementById("estoque").value = p.estoque;
  document.getElementById("categoria").value = p.categoria;

  fecharModal();
}

// DELETE
async function deletar(id) {
  if (!confirm("Excluir produto?")) return;

  await fetch(API + "/apagar_produtos", {
    method: "DELETE",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ id })
  });

  carregarProdutos();
}

// HELPERS
function pegarDados() {
  return {
    id: document.getElementById("id").value,
    nome: document.getElementById("nome").value,
    descricao: document.getElementById("descricao").value,
    preco: document.getElementById("preco").value,
    estoque: document.getElementById("estoque").value,
    categoria: document.getElementById("categoria").value
  };
}

function limparFormulario() {
  form.reset();
  document.getElementById("id").value = "";
}

function abrirModal() {
  modal.style.display = "block";
  carregarProdutos();
}

function fecharModal() {
  modal.style.display = "none";
}
</script>

</body>
</html>
