<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro</title>

  <!-- Materialize -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <style>
    body {
      background: #f5f5f5;
    }

    .card {
      margin-top: 50px;
      padding: 20px;
      border-radius: 12px;
    }

    h5 {
      text-align: center;
      margin-bottom: 30px;
    }

    .btn-full {
      width: 100%;
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="row">
      <div class="col s12 m8 offset-m2">

        <div class="card white z-depth-3">
          <h5>Cadastro de Pessoa</h5>

          <form id="formPessoa">

            <input type="hidden" id="pessoa_id">

            <div class="input-field">
              <input id="documento" type="text">
              <label for="documento">CPF ou CNPJ</label>
            </div>

            <div class="input-field">
              <input id="nome_razao_social" type="text">
              <label for="nome_razao_social">Nome / Razão Social</label>
            </div>

            <div class="input-field">
              <input id="email" type="email">
              <label for="email">Email</label>
            </div>

            <div class="input-field">
              <input id="cep" type="text">
              <label for="cep">CEP</label>
            </div>

            <div class="input-field">
              <input id="endereco" type="text">
              <label for="endereco">Endereço</label>
            </div>

            <div class="input-field">
              <input id="numero" type="text">
              <label for="numero">Número</label>
            </div>

            <div class="input-field">
              <input id="bairro" type="text">
              <label for="bairro">Bairro</label>
            </div>

            <div class="input-field">
              <input id="cidade" type="text">
              <label for="cidade">Cidade</label>
            </div>

            <div class="input-field">
              <input id="estado" type="text">
              <label for="estado">UF</label>
            </div>

            <br>

            <button class="btn waves-effect waves-light btn-full" type="submit">
              Salvar
              <i class="material-icons right">send</i>
            </button>

          </form>
        </div>

      </div>
    </div>
  </div>

  <!-- JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>

</body>
</html>
