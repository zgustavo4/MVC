<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Produtos</title>

  <!-- Materialize -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <style>
    body {
      background: #eef1f5;
    }

    .card {
      border-radius: 12px;
    }

    header {
      margin-bottom: 20px;
    }

    .btn {
      border-radius: 8px;
    }

    table td {
      vertical-align: middle;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <nav class="blue">
    <div class="nav-wrapper container">
      <span class="brand-logo">Produtos</span>
    </div>
  </nav>

  <div class="container">

    <div class="row">

      <!-- FORM -->
      <div class="col s12 m5">
        <div class="card">
          <div class="card-content">
            <span class="card-title">Cadastrar / Editar</span>

            <form id="form">
              <input type="hidden" id="id">

              <div class="input-field">
                <input id="nome" required>
                <label>Nome</label>
              </div>

              <div class="input-field">
                <input id="descricao">
                <label>Descrição</label>
              </div>

              <div class="input-field">
                <input id="preco" type="number" step="0.01" required>
                <label>Preço</label>
              </div>

              <div class="input-field">
                <input id="estoque" type="number">
                <label>Estoque</label>
              </div>

              <div class="input-field">
                <input id="categoria">
                <label>Categoria</label>
              </div>

              <button class="btn blue waves-effect waves-light" type="submit">
                Salvar
                <i class="material-icons right">send</i>
              </button>
            </form>
          </div>
        </div>
      </div>

      <!-- LISTA -->
      <div class="col s12 m7">
        <div class="card">
          <div class="card-content">
            <span class="card-title">Lista de Produtos</span>

            <table class="striped responsive-table">
              <thead>
                <tr>
                  <th>Nome</th>
                  <th>Preço</th>
                  <th>Estoque</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody id="lista"></tbody>
            </table>

          </div>
        </div>
      </div>

    </div>

  </div>

  <!-- JS -->
  <script>
    const API = "http://localhost:3000/produtos";

    const form = document.getElementById("form");
    const lista = document.getElementById("lista");

    // 🔹 TOAST
    function msg(texto, cor="green") {
      M.toast({ html: texto, classes: cor });
    }

    // 🔹 CARREGAR
    async function carregar() {
      try {
        const res = await fetch(API);
        const dados = await res.json();

        lista.innerHTML = "";

        dados.forEach(p => {
          lista.innerHTML += `
            <tr>
              <td>${p.nome}</td>
              <td>R$ ${p.preco}</td>
              <td>${p.estoque}</td>
              <td>
                <button class="btn-small blue" onclick='editar(${JSON.stringify(p)})'>
                  <i class="material-icons">edit</i>
                </button>
                <button class="btn-small red" onclick='remover(${p.id})'>
                  <i class="material-icons">delete</i>
                </button>
              </td>
            </tr>
          `;
        });

      } catch (e) {
        msg("Erro ao carregar", "red");
      }
    }

    // 🔹 SALVAR
    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const id = document.getElementById("id").value;

      const produto = {
        nome: document.getElementById("nome").value,
        descricao: document.getElementById("descricao").value,
        preco: parseFloat(document.getElementById("preco").value),
        estoque: parseInt(document.getElementById("estoque").value) || 0,
        categoria: document.getElementById("categoria").value
      };

      try {
        if (id) {
          await fetch(`${API}/${id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(produto)
          });
          msg("Atualizado!");
        } else {
          await fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(produto)
          });
          msg("Cadastrado!");
        }

        form.reset();
        document.getElementById("id").value = "";
        M.updateTextFields();

        carregar();

      } catch (e) {
        msg("Erro ao salvar", "red");
      }
    });

    // 🔹 EDITAR
    function editar(p) {
      document.getElementById("id").value = p.id;
      document.getElementById("nome").value = p.nome;
      document.getElementById("descricao").value = p.descricao;
      document.getElementById("preco").value = p.preco;
      document.getElementById("estoque").value = p.estoque;
      document.getElementById("categoria").value = p.categoria;

      M.updateTextFields();
    }

    // 🔹 DELETE
    async function remover(id) {
      if (!confirm("Deseja excluir?")) return;

      try {
        await fetch(`${API}/${id}`, { method: "DELETE" });
        msg("Removido!", "orange");
        carregar();
      } catch {
        msg("Erro ao remover", "red");
      }
    }

    // INIT
    carregar();
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>

</body>
</html>
