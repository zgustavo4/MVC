<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Produtos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { background-color: #f5f5f5; }
        .main-container { margin-top: 20px; }
        nav { margin-bottom: 30px; }
        .fixed-action-btn { bottom: 45px; right: 24px; }
    </style>
</head>
<body>

    <nav class="amber darken-4">
        <div class="nav-wrapper container">
            <a href="#" class="brand-logo hide-on-small-only">Estoque</a>
            <ul id="nav-mobile" class="right">
                <li><a href="index.html"><i class="material-icons left">people</i>Pessoas</a></li>
                <li class="active"><a href="produtos.html"><i class="material-icons left">shopping_cart</i>Produtos</a></li>
                <li><a href="#!" onclick="limparFormulario()"><i class="material-icons">add_box</i></a></li>
                <li><a href="#modalProdutos" class="modal-trigger"><i class="material-icons">inventory</i></a></li>
            </ul>
        </div>
    </nav>

    <div class="container main-container">
        <div class="row">
            <form id="formProduto" class="col s12 card-panel hoverable white">
                <input type="hidden" id="produto_id">
                <h4 class="center-align amber-text text-darken-4">Novo Produto</h4>
                
                <div class="row">
                    <div class="input-field col s12 m8">
                        <i class="material-icons prefix">label</i>
                        <input id="nome" type="text" required>
                        <label for="nome">Nome do Produto</label>
                    </div>
                    <div class="input-field col s12 m4">
                        <i class="material-icons prefix">category</i>
                        <input id="categoria" type="text">
                        <label for="categoria">Categoria</label>
                    </div>
                </div>

                <div class="row">
                    <div class="input-field col s12">
                        <i class="material-icons prefix">description</i>
                        <textarea id="descricao" class="materialize-textarea"></textarea>
                        <label for="descricao">Descrição</label>
                    </div>
                </div>

                <div class="row">
                    <div class="input-field col s12 m6">
                        <i class="material-icons prefix">attach_money</i>
                        <input id="preco" type="number" step="0.01" required>
                        <label for="preco">Preço</label>
                    </div>
                    <div class="input-field col s12 m6">
                        <i class="material-icons prefix">storage</i>
                        <input id="estoque" type="number" required>
                        <label for="estoque">Qtd em Estoque</label>
                    </div>
                </div>

                <div class="row center-align">
                    <button class="btn-large waves-effect waves-light amber darken-4" type="submit">
                        Salvar Produto <i class="material-icons right">save</i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div id="modalProdutos" class="modal modal-fixed-footer">
        <div class="modal-content">
            <h4>Estoque Atual</h4>
            <table class="highlight">
                <thead>
                    <tr>
                        <th>ID</th><th>Nome</th><th>Preço</th><th>Qtd</th><th class="center">Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaProdutos"></tbody>
            </table>
        </div>
        <div class="modal-footer"><a href="#!" class="modal-close btn-flat">Fechar</a></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script>
        const API_PROD = 'http://localhost:3000';
        document.addEventListener('DOMContentLoaded', () => M.AutoInit());

        document.getElementById('formProduto').addEventListener('submit', async e => {
            e.preventDefault();
            const id = document.getElementById('produto_id').value;
            const payload = {
                nome: document.getElementById('nome').value,
                descricao: document.getElementById('descricao').value,
                preco: document.getElementById('preco').value,
                estoque: document.getElementById('estoque').value,
                categoria: document.getElementById('categoria').value
            };
            const url = id ? `${API_PROD}/atualizarprodutos/${id}` : `${API_PROD}/criarprodutos`;
            await fetch(url, {
                method: id ? 'PUT' : 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            M.toast({html: 'Produto Salvo!', classes: 'amber darken-2'});
            limparFormulario();
        });

        async function carregarProdutos() {
            const r = await fetch(`${API_PROD}/produtos`);
            const data = await r.json();
            document.getElementById('tabelaProdutos').innerHTML = data.map(p => `
                <tr>
                    <td>${p.id}</td><td>${p.nome}</td><td>R$ ${p.preco}</td><td>${p.estoque}</td>
                    <td class="center">
                        <button class="btn-small blue" onclick="editarProduto(${p.id})"><i class="material-icons">edit</i></button>
                        <button class="btn-small red" onclick="deletarProduto(${p.id})"><i class="material-icons">delete</i></button>
                    </td>
                </tr>`).join('');
        }

        async function editarProduto(id) {
            const r = await fetch(`${API_PROD}/produtos`);
            const data = await r.json();
            const p = data.find(x => x.id === id);
            document.getElementById('produto_id').value = p.id;
            document.getElementById('nome').value = p.nome;
            document.getElementById('descricao').value = p.descricao;
            document.getElementById('preco').value = p.preco;
            document.getElementById('estoque').value = p.estoque;
            document.getElementById('categoria').value = p.categoria;
            M.updateTextFields();
            M.Modal.getInstance(document.getElementById('modalProdutos')).close();
        }

        async function deletarProduto(id) {
            if(confirm('Excluir produto?')) { 
                await fetch(`${API_PROD}/deletarprodutos/${id}`, {method:'DELETE'}); 
                carregarProdutos(); 
            }
        }

        function limparFormulario() { document.getElementById('formProduto').reset(); document.getElementById('produto_id').value=''; M.updateTextFields(); }
        $(document).ready(() => { $('.modal').modal({ onOpenStart: carregarProdutos }); });
    </script>
</body>
</html>
