    <meta charset="UTF-8">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">

        .main-container { margin-top: 20px; }
        .error { color: #f44336; font-size: 0.8rem; display: none; margin-bottom: 10px; }
        nav { margin-bottom: 30px; }
        .fixed-action-btn { bottom: 45px; right: 24px; }
    </style>
</head>
<body>

<<<<<<< HEAD
  <div class="container">
    <div class="row">
      <div class="col s12 m8 offset-m2">

        <div class="card white z-depth-3">
          <h5>Cadastro de Pessoa</h5>

          <form id="formPessoa">

            <input type="hidden" id="pessoa_id">

            <div class="input-field">
              <input id="documento" type="text">
              <label for="documento">CPF ou CNPJ</label>
            </div>

            <div class="input-field">
              <input id="nome_razao_social" type="text">
              <label for="nome_razao_social">Nome / Razão Social</label>
            </div>

            <div class="input-field">
              <input id="email" type="email">
              <label for="email">Email</label>
            </div>

            <div class="input-field">
              <input id="cep" type="text">
              <label for="cep">CEP</label>
            </div>

            <div class="input-field">
              <input id="endereco" type="text">
              <label for="endereco">Endereço</label>
            </div>

            <div class="input-field">
              <input id="numero" type="text">
              <label for="numero">Número</label>
            </div>

            <div class="input-field">
              <input id="bairro" type="text">
              <label for="bairro">Bairro</label>
            </div>

            <div class="input-field">
              <input id="cidade" type="text">
              <label for="cidade">Cidade</label>
            </div>

            <div class="input-field">
              <input id="estado" type="text">
              <label for="estado">UF</label>
            </div>

            <br>

            <button class="btn waves-effect waves-light btn-full" type="submit">
              Salvar
              <i class="material-icons right">send</i>
            </button>

          </form>
        </div>

      </div>
    </div>
  </div>

  <!-- JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>

    <nav class="blue darken-3">
        <div class="nav-wrapper container">
            <a href="#" class="brand-logo hide-on-small-only">Sistema</a>
            <ul id="nav-mobile" class="right">
                <li class="active"><a href="index.html"><i class="material-icons left">people</i>Pessoas</a></li>
                <li><a href="produtos.html"><i class="material-icons left">shopping_cart</i>Produtos</a></li>
                <li><a href="#!" onclick="limparFormulario()"><i class="material-icons">add</i></a></li>
                <li><a href="#modalPesquisa" class="modal-trigger"><i class="material-icons">search</i></a></li>
            </ul>
        </div>
    </nav>

    <div class="container main-container">
        <div class="row">
            <form id="formPessoa" class="col s12 card-panel hoverable white">
                <input type="hidden" id="pessoa_id">
                <h4 class="center-align blue-text text-darken-3">Cadastro de Pessoa</h4>
                
                <div class="row">
                    <div class="input-field col s12 m4">
                        <i class="material-icons prefix">assignment_ind</i>
                        <input id="documento" type="text" class="validate">
                        <label for="documento">CPF ou CNPJ</label>
                    </div>
                    <div class="input-field col s12 m8">
                        <i class="material-icons prefix">person</i>
                        <input id="nome_razao_social" type="text" class="validate" required>
                        <label for="nome_razao_social">Nome ou Razão Social</label>
                    </div>
                </div>

                <div class="row">
                    <div class="input-field col s12">
                        <i class="material-icons prefix">business</i>
                        <input id="nome_social_fantasia" type="text" class="validate">
                        <label for="nome_social_fantasia">Nome Social ou Nome Fantasia</label>
                    </div>
                </div>

                <div class="row">
                    <div class="input-field col s12 m3">
                        <i class="material-icons prefix">location_on</i>
                        <input id="cep" type="text" class="validate">
                        <label for="cep">CEP</label>
                    </div>
                    <div class="input-field col s12 m6">
                        <input id="endereco" type="text" class="validate">
                        <label for="endereco">Endereço</label>
                    </div>
                    <div class="input-field col s12 m3">
                        <input id="numero" type="text" class="validate">
                        <label for="numero">Número</label>
                    </div>
                </div>

                <div class="row">
                    <div class="input-field col s12 m4">
                        <input type="text" id="bairro" class="validate">
                        <label for="bairro">Bairro</label>
                    </div>
                    <div class="input-field col s12 m5">
                        <input type="text" id="cidade" class="validate">
                        <label for="cidade">Cidade</label>
                    </div>
                    <div class="input-field col s12 m3">
                        <input type="text" id="estado" maxlength="2" class="validate">
                        <label for="estado">UF</label>
                    </div>
                </div>

                <div class="row">
                    <div class="input-field col s12 m8">
                        <i class="material-icons prefix">email</i>
                        <input type="email" id="email" class="validate">
                        <label for="email">E-mail</label>
                        <span id="emailError" class="error">E-mail inválido</span>
                    </div>
                    <div class="col s12 m4 center-align" style="padding-top: 20px;">
                        <button class="btn-large waves-effect waves-light blue darken-3" type="submit">
                            Salvar <i class="material-icons right">send</i>
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="fixed-action-btn">
        <a class="btn-floating btn-large blue darken-3">
          <i class="large material-icons">menu</i>
        </a>
        <ul>
          <li><a href="produtos.html" class="btn-floating amber darken-3"><i class="material-icons">shopping_cart</i></a></li>
          <li><a href="#!" onclick="limparFormulario()" class="btn-floating green"><i class="material-icons">add</i></a></li>
        </ul>
    </div>

    <div id="modalPesquisa" class="modal modal-fixed-footer">
        <div class="modal-content">
            <h4>Pessoas Cadastradas</h4>
            <table class="highlight">
                <thead>
                    <tr>
                        <th>ID</th><th>Nome</th><th>Doc</th><th class="center">Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaPessoas"></tbody>
            </table>
        </div>
        <div class="modal-footer"><a href="#!" class="modal-close btn-flat">Fechar</a></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script>
        const API_URL = 'http://localhost:3000/pessoas';
        document.addEventListener('DOMContentLoaded', () => M.AutoInit());

        // Máscaras e CEP
        document.getElementById('documento').addEventListener('input', e => {
            let v = e.target.value.replace(/\D/g, "");
            v = v.length <= 11 ? v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4") : v.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, "$1.$2.$3/$4-$5");
            e.target.value = v;
        });

        document.getElementById('cep').addEventListener('input', async e => {
            let v = e.target.value.replace(/\D/g, "");
            if (v.length === 8) {
                const r = await fetch(`https://viacep.com.br/ws/${v}/json/`);
                const d = await r.json();
                if(!d.erro) {
                    document.getElementById('endereco').value = d.logradouro;
                    document.getElementById('bairro').value = d.bairro;
                    document.getElementById('cidade').value = d.localidade;
                    document.getElementById('estado').value = d.uf;
                    M.updateTextFields();
                }
            }
        });

        // CRUD
        document.getElementById('formPessoa').addEventListener('submit', async e => {
            e.preventDefault();
            const id = document.getElementById('pessoa_id').value;
            const payload = {
                documento: document.getElementById('documento').value.replace(/\D/g, ""),
                nome_razao_social: document.getElementById('nome_razao_social').value,
                nome_social_fantasia: document.getElementById('nome_social_fantasia').value,
                cep: document.getElementById('cep').value.replace(/\D/g, ""),
                endereco: document.getElementById('endereco').value,
                numero: document.getElementById('numero').value,
                bairro: document.getElementById('bairro').value,
                cidade: document.getElementById('cidade').value,
                estado: document.getElementById('estado').value,
                email: document.getElementById('email').value
            };
            await fetch(id ? `${API_URL}/${id}` : API_URL, {
                method: id ? 'PUT' : 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            M.toast({html: 'Sucesso!', classes: 'green'});
            limparFormulario();
        });

        async function carregarPessoas() {
            const r = await fetch(API_URL);
            const data = await r.json();
            document.getElementById('tabelaPessoas').innerHTML = data.map(p => `
                <tr>
                    <td>${p.id}</td><td>${p.nome_razao_social}</td><td>${p.documento}</td>
                    <td class="center">
                        <button class="btn-small orange" onclick="editarPessoa(${p.id})"><i class="material-icons">edit</i></button>
                        <button class="btn-small red" onclick="deletarPessoa(${p.id})"><i class="material-icons">delete</i></button>
                    </td>
                </tr>`).join('');
        }

        async function editarPessoa(id) {
            const r = await fetch(API_URL);
            const data = await r.json();
            const p = data.find(x => x.id === id);
            Object.keys(p).forEach(key => { if(document.getElementById(key)) document.getElementById(key).value = p[key]; });
            document.getElementById('pessoa_id').value = p.id;
            M.updateTextFields();
            M.Modal.getInstance(document.getElementById('modalPesquisa')).close();
        }

        async function deletarPessoa(id) {
            if(confirm('Excluir?')) { await fetch(`${API_URL}/${id}`, {method:'DELETE'}); carregarPessoas(); }
        }

        function limparFormulario() { document.getElementById('formPessoa').reset(); document.getElementById('pessoa_id').value=''; M.updateTextFields(); }

        $(document).ready(() => { $('.modal').modal({ onOpenStart: carregarPessoas }); $('.fixed-action-btn').floatingActionButton(); });
    </script>
</body>
</html>
